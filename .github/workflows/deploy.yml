name: Build & Deploy Shiny Apps

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    permissions:
      packages: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: 001-hello
            image: shiny-001-hello
          - name: 006-tabsets
            image: shiny-006-tabsets
          - name: 050-kmeans-example
            image: shiny-050-kmeans-example
          - name: DEApp-master
            image: shiny-deapp
          - name: feavis
            image: shiny-feavis
          - name: test1-demo
            image: shiny-test1
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.app.name }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.app.image }}:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.app.image }}:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ matrix.app.image }}:cache,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        env:
          LDAP_MANAGER_PASSWORD: ${{ secrets.LDAP_MANAGER_PASSWORD }}
        run: |
          sudo /usr/bin/cp shinyproxy/application.yml /etc/shinyproxy/application.yml
          sudo /usr/bin/cp shinyproxy/application-public.yml /etc/shinyproxy/application-public.yml
          sudo /usr/bin/cp -r shinyproxy/templates /etc/shinyproxy/templates
          sudo env LDAP_MANAGER_PASSWORD="$LDAP_MANAGER_PASSWORD" python3 -c "import os; f='/etc/shinyproxy/application.yml'; c=open(f).read().replace('\${LDAP_MANAGER_PASSWORD}',os.environ['LDAP_MANAGER_PASSWORD']); open(f,'w').write(c)"
          echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
          docker pull ghcr.io/${{ secrets.GHCR_USER }}/shiny-001-hello:latest
          docker pull ghcr.io/${{ secrets.GHCR_USER }}/shiny-006-tabsets:latest
          docker pull ghcr.io/${{ secrets.GHCR_USER }}/shiny-050-kmeans-example:latest
          docker pull ghcr.io/${{ secrets.GHCR_USER }}/shiny-deapp:latest
          docker pull ghcr.io/${{ secrets.GHCR_USER }}/shiny-feavis:latest
          docker pull ghcr.io/${{ secrets.GHCR_USER }}/shiny-test1:latest
          sudo /usr/bin/systemctl restart shinyproxy
          sudo /usr/bin/systemctl restart shinyproxy-public
          docker system prune -f
