name: Build & Deploy Shiny Apps

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: 001-hello
            image: shiny-001-hello
          - name: 006-tabsets
            image: shiny-006-tabsets
          - name: 050-kmeans-example
            image: shiny-050-kmeans-example
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.app.name }}
          push: true
          tags: zhongyuli2026/${{ matrix.app.image }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.RHEL_HOST }}
          username: ${{ secrets.RHEL_USER }}
          key: ${{ secrets.RHEL_SSH_KEY }}
          source: "shinyproxy/application.yml"
          target: "/opt/shinyproxy/"
          strip_components: 1
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RHEL_HOST }}
          username: ${{ secrets.RHEL_USER }}
          key: ${{ secrets.RHEL_SSH_KEY }}
          script: |
            docker pull zhongyuli2026/shiny-001-hello:latest
            docker pull zhongyuli2026/shiny-006-tabsets:latest
            docker pull zhongyuli2026/shiny-050-kmeans-example:latest
            sudo systemctl restart shinyproxy
            docker image prune -f
