server:
  servlet:
    context-path: /apps
  forward-headers-strategy: native

proxy:
  title: "Bioinformatics Core Shiny Apps"
  port: 8080
  landing-page: /
  authentication: ldap
  ldap:
    url: ldaps://ldap.uchicago.edu:636/dc=uchicago,dc=edu
    manager-dn: uid=criucldap,ou=people,dc=uchicago,dc=edu
    manager-password: ${LDAP_MANAGER_PASSWORD}
    user-search-base: ou=people
    user-search-filter: (&(uid={0})(objectClass=person))
  docker:
    internal-networking: false
    url: http://localhost:2375
  specs:
    - id: hello
      display-name: "Hello Shiny"
      description: "A simple Hello World Shiny app."
      container-image: ghcr.io/zhongyuli2026/shiny-001-hello:latest
      port: 3838
    - id: tabsets
      display-name: "Tabsets"
      description: "Demonstrates tabset panels in Shiny."
      container-image: ghcr.io/zhongyuli2026/shiny-006-tabsets:latest
      port: 3838
    - id: kmeans
      display-name: "K-Means Clustering"
      description: "Interactive K-Means clustering visualization."
      container-image: ghcr.io/zhongyuli2026/shiny-050-kmeans-example:latest
      port: 3838
    - id: feavis
      display-name: "FEAVis"
      description: "Functional enrichment analysis visualization."
      container-image: ghcr.io/zhongyuli2026/shiny-feavis:latest
      port: 3838
    - id: test_yanli
      display-name: "test1 yan"
      description: "test demo with zhongyu, operated by Yan"
      container-image: ghcr.io/zhongyuli2026/shiny-test1:latest
      port: 3838
